# Notice the apps here are for the HEMAIA TO CFG only
# With 4chpilets and 1cluster per chiplet
# It can run both the single_chip and multi_chip workloads
# In the single_chip workloads, the other 3 chiplets will exit after the init since it has no work to do
# The multi_chip workloads will run on all 4 chiplets
runs:
  - app_0:
    - HOST_APP_TYPE: host_only
    - CHIP_TYPE: single_chip
    - WORKLOAD: clk_rst_configurator
    - DEV_APP: None
  - app_1:
    - HOST_APP_TYPE: host_only
    - CHIP_TYPE: multi_chip
    - WORKLOAD: system_xdma_copy
    - DEV_APP: None
  - app_2:
    - HOST_APP_TYPE: host_only
    - CHIP_TYPE: multi_chip
    - WORKLOAD: multi_d2d_streams
    - DEV_APP: None
  - app_3:
    - HOST_APP_TYPE: offload_legacy
    - CHIP_TYPE: single_chip
    - WORKLOAD: None
    - DEV_APP: snax-test-integration
  - app_4:
    - HOST_APP_TYPE: offload_legacy
    - CHIP_TYPE: single_chip
    - WORKLOAD: None
    - DEV_APP: snax-xdma-copy
  - app_5:
    - HOST_APP_TYPE: offload_legacy
    - CHIP_TYPE: single_chip
    - WORKLOAD: None
    - DEV_APP: snax-xdma-hazard
  - app_6:
    - HOST_APP_TYPE: offload_bingo_sw
    - CHIP_TYPE: single_chip
    - WORKLOAD: dummy_1cluster
    - DEV_APP: snax-bingo-offload
  - app_7:
    - HOST_APP_TYPE: offload_bingo_sw
    - CHIP_TYPE: single_chip
    - WORKLOAD: gemm_tiled_1cluster
    - DEV_APP: snax-bingo-offload
  - app_8:
    - HOST_APP_TYPE: offload_bingo_sw
    - CHIP_TYPE: single_chip
    - WORKLOAD: gemm_stacked_1cluster
    - DEV_APP: snax-bingo-offload
  - app_9:
    - HOST_APP_TYPE: offload_bingo_sw
    - CHIP_TYPE: single_chip
    - WORKLOAD: gemm_merge_load_and_compute_1cluster
    - DEV_APP: snax-bingo-offload
  - app_10:
    - HOST_APP_TYPE: offload_bingo_sw
    - CHIP_TYPE: single_chip
    - WORKLOAD: gemm_seperate_load_and_compute_1cluster
    - DEV_APP: snax-bingo-offload
  - app_11:
    - HOST_APP_TYPE: offload_bingo_sw
    - CHIP_TYPE: multi_chip
    - WORKLOAD: gemm_broadcast_4chiplet_1cluster
    - DEV_APP: snax-bingo-offload
  - app_12:
    - HOST_APP_TYPE: offload_bingo_sw
    - CHIP_TYPE: multi_chip
    - WORKLOAD: xdma_mempool_4chiplet_1cluster
    - DEV_APP: snax-bingo-offload
  - app_13:
    - HOST_APP_TYPE: offload_bingo_hw
    - CHIP_TYPE: single_chip
    - WORKLOAD: gemm_double_buffer_1cluster
    - DEV_APP: snax-bingo-offload
  - app_14:
    - HOST_APP_TYPE: offload_bingo_hw
    - CHIP_TYPE: single_chip
    - WORKLOAD: gemm_seperate_load_and_compute_serial_1cluster
    - DEV_APP: snax-bingo-offload
  - app_15:
    - HOST_APP_TYPE: offload_bingo_hw
    - CHIP_TYPE: single_chip
    - WORKLOAD: gemm_seperate_load_and_compute_parallel_1cluster
    - DEV_APP: snax-bingo-offload
  - app_16:
    - HOST_APP_TYPE: offload_bingo_hw
    - CHIP_TYPE: multi_chip
    - WORKLOAD: gemm_broadcast_4chiplet_1cluster
    - DEV_APP: snax-bingo-offload
  - app_17:
    - HOST_APP_TYPE: offload_bingo_hw
    - CHIP_TYPE: multi_chip
    - WORKLOAD: gemm_seperate_load_and_compute_parallel_4chiplet_1cluster
